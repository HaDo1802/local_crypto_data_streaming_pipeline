name: local_streaming_project_finance

x-kafka-bootstrap: &kafka-bootstrap kafka:9092
x-flink-image: &flink-image local_streaming_project_finance-flink:latest

services:
  kafka:
    image: apache/kafka:4.0.0
    hostname: kafka
    ports:
      - "19092:19092"
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: CryptoStreamCluster01
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  kafka-init-topics:
    image: apache/kafka:4.0.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092
        --create --if-not-exists --topic trades --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list &&
        echo "Kafka topics ready."

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: crypto-streaming
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: *kafka-bootstrap
    depends_on:
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/lakehouse &&
        mc mb --ignore-existing local/lakehouse/trades &&
        echo "MinIO buckets ready."

  flink-jobmanager:
    image: *flink-image
    build:
      context: .
      dockerfile: docker/Dockerfile.flink
    hostname: flink-jobmanager
    command: jobmanager
    ports:
      - "8082:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 3
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/overview >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  flink-taskmanager:
    image: *flink-image
    build:
      context: .
      dockerfile: docker/Dockerfile.flink
    hostname: flink-taskmanager
    command: taskmanager
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 3
        state.backend: hashmap
        state.checkpoints.dir: file:///tmp/flink-checkpoints
        execution.checkpointing.interval: 30s
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - flink_checkpoints:/tmp/flink-checkpoints

  price-aggregator:
    image: *flink-image
    build:
      context: .
      dockerfile: docker/Dockerfile.flink
    restart: on-failure
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      kafka-init-topics:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: *kafka-bootstrap
      TRADES_TOPIC: trades
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      WINDOW_SECONDS: "10"
      ENABLE_CONSOLE_SINK: "false"
    entrypoint:
      - "bash"
      - "-lc"
      - >
        /opt/flink/bin/flink run
        --jobmanager flink-jobmanager:8081
        --python /opt/flink/jobs/price_aggregator.py
        -D parallelism.default=3

  generator:
    build:
      context: .
      dockerfile: docker/Dockerfile.generator
    restart: on-failure
    environment:
      BOOTSTRAP_SERVERS: *kafka-bootstrap
      TRADES_TOPIC: trades
      SYMBOLS: "btcusdt,ethusdt,solusdt,bnbusdt,xrpusdt"
      BINANCE_WSS_BASE: "wss://data-stream.binance.vision"
    depends_on:
      kafka-init-topics:
        condition: service_completed_successfully

  lake-writer:
    build:
      context: .
      dockerfile: docker/Dockerfile.lake
    restart: on-failure
    depends_on:
      kafka-init-topics:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      BOOTSTRAP_SERVERS: *kafka-bootstrap
      TRADES_TOPIC: trades
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: lakehouse
      FLUSH_INTERVAL_SEC: "60"
      FLUSH_BATCH_SIZE: "500"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: lakehouse
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: on-failure

volumes:
  kafka_data:
  postgres_data:
  minio_data:
  flink_checkpoints:
